<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site no Iframe</title>
    <style>
        /* Remove as margens padrão e faz a página ocupar 100% do espaço */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Evita barras de rolagem duplicadas */
            background-color: #f4f4f9;
        }
        
        /* Configura o iframe para preencher a tela inteira sem bordas */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- O site já carrega automaticamente aqui -->
    <iframe src="https://ona.bet.br/"></iframe>

</body>
</html>
